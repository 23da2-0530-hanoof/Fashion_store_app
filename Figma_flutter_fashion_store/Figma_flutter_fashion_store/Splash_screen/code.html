    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;

<body class="bg-[#031410] text-on-background font-body overflow-hidden">
<!-- Main Splash Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center deep-green-gradient px-8 overflow-hidden">
<!-- Background Texture Overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none mix-blend-soft-light">

</div>
<!-- Centered Brand Identity -->
<div class="relative z-10 flex flex-col items-center">
<!-- Upper Line -->
<div class="w-16 h-[0.5px] bg-white/20 mb-20"></div>
<div class="flex flex-col items-center text-center">
<h2 class="text-white font-label text-[0.65rem] tracking-[0.5em] uppercase mb-6 font-medium">
          The Digital
        </h2>
<h1 class="text-white font-label italic font-bold text-7xl md:text-8xl tracking-tight leading-[0.9] mb-1">
          STUDIO
        </h1>
<h1 class="text-white font-label font-bold text-7xl md:text-8xl tracking-tight leading-[0.9]">
          BLACK
        </h1>
<p class="text-white/50 font-label text-[0.55rem] md:text-[0.65rem] mt-10 tracking-[0.4em] uppercase italic">
        High Fashion &amp; Curation
      </p>
</div>
<!-- Lower Line -->
<div class="w-16 h-[0.5px] bg-white/20 mt-20"></div>
</div>
<!-- Bottom Action Hint -->
<div class="absolute bottom-12 flex flex-col items-center gap-8 w-full">
<div class="flex flex-col items-center w-full max-w-xs">
<!-- Enter Collection Button -->
<button class="w-full bg-white/5 backdrop-blur-md border border-white/10 text-white px-8 py-5 rounded-full text-xs uppercase tracking-[0.2em] font-medium hover:bg-white/10 transition-all duration-500 ease-in-out group mb-10 flex items-center justify-center gap-3">
          Enter Collection
          <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform duration-300" data-icon="arrow_forward">arrow_forward</span>
</button>
<span class="text-white/20 text-[0.55rem] uppercase tracking-[0.4em] font-light">
          Establishment 2026
        </span>
</div>
</div>
<!-- Decorative Corner Elements (Inherited from original for extra polish) -->
<div class="absolute top-8 left-8 border-t border-l border-white/5 w-12 h-12"></div>
<div class="absolute top-8 right-8 border-t border-r border-white/5 w-12 h-12"></div>
<div class="absolute bottom-8 left-8 border-b border-l border-white/5 w-12 h-12"></div>
<div class="absolute bottom-8 right-8 border-b border-r border-white/5 w-12 h-12"></div>
