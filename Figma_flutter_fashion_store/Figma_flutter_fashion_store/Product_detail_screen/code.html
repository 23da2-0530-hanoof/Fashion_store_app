<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Product Details - Black Sunglasses</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Noto Serif for titles, Inter for body -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .font-serif {
      font-family: 'Noto Serif', serif;
    }
  </style>
<style data-purpose="brand-colors">
    /* Brand Dark Green color as seen in the "ADD TO CART" button and selected state */
    .bg-brand-dark {
      background-color: #00322a;
    }
    .text-brand-dark {
      color: #00322a;
    }
    .border-brand-dark {
      border-color: #00322a;
    }
  </style>
</head>
<body class="bg-white text-[#333] min-h-screen pb-24">
<!-- BEGIN: Hero Section -->
<section class="relative w-full h-[45vh] overflow-hidden" id="hero">
<!-- Product Main Image -->
<img alt="Black Sunglasses" class="w-full h-full object-cover object-center" src="https://lh3.googleusercontent.com/aida/ADBb0uigmpno90wB5WBjOTIkU8luCjUd3igwvghxCImn6v6DBARYf6wyvgTAmHpoADpw29DbvAy9_CcF5TKyQNm09ibQDkocPOTqCj3hLhJBWuBnqJ71XdDfvj5ZJFgsg7UGeyDo9Jy1zO2OcJyDRYy-IY7EN3fextoBDFkJbLk-2EFw2dbjktHtdtXh9OazDyv6MKM0TbZBl1DyVqBTdWc1A8Yxi20zsFElM_YuTV5o_rVUAG5pHtPxKlwDLJLML9_Tf6UHF02LmxRy2zI"/>
<!-- Top Navigation Overlay -->
<nav class="absolute top-0 left-0 right-0 p-4 flex items-center justify-between z-10 text-white">
<button aria-label="Go back" class="p-2">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<div class="flex items-center space-x-4">
<button aria-label="Add to wishlist" class="p-2">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<button aria-label="View shopping bag" class="p-2">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
</nav>
</section>
<!-- END: Hero Section -->
<!-- BEGIN: Product Details -->
<main class="px-6 py-8">
<!-- Title and Price -->
<header class="mb-8">
<h1 class="text-3xl font-serif font-bold text-gray-900 mb-2">Black Sunglasses</h1>
<p class="text-xl font-semibold text-brand-dark">LKR 450.00</p>
</header>
<!-- Size Selection -->
<section class="mb-8" data-purpose="size-selector">
<h3 class="text-sm font-medium text-gray-600 mb-4">Size</h3>
<div class="flex flex-wrap gap-3">
<!-- Unselected Sizes -->
<button class="w-12 h-10 flex items-center justify-center border border-gray-300 rounded text-xs font-medium hover:border-gray-900 transition-colors">XS</button>
<button class="w-12 h-10 flex items-center justify-center border border-gray-300 rounded text-xs font-medium hover:border-gray-900 transition-colors">S</button>
<!-- Selected Size -->
<button aria-current="true" class="w-12 h-10 flex items-center justify-center bg-brand-dark text-white rounded text-xs font-medium">M</button>
<button class="w-12 h-10 flex items-center justify-center border border-gray-300 rounded text-xs font-medium hover:border-gray-900 transition-colors">L</button>
<button class="w-12 h-10 flex items-center justify-center border border-gray-300 rounded text-xs font-medium hover:border-gray-900 transition-colors">XL</button>
</div>
</section>
<!-- Description -->
<section class="mb-10" data-purpose="product-description">
<h3 class="text-sm font-medium text-gray-600 mb-3">Description</h3>
<p class="text-gray-500 text-sm leading-relaxed max-w-prose">
        An exquisite piece from our Black collection. Crafted with the finest materials to provide a luxurious feel and a breathtaking shape. Perfect for formal events and evening celebrations.
      </p>
</section>
</main>
<!-- END: Product Details -->
<!-- BEGIN: Footer Action -->
<footer class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-sm border-t border-gray-100 z-50">
<button class="w-full bg-brand-dark text-white py-4 rounded font-bold text-sm uppercase tracking-widest shadow-lg active:scale-[0.98] transition-transform">
      Add to Cart
    </button>
</footer>
<!-- END: Footer Action -->
</body></html>
